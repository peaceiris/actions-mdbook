name: Daily Test

on:
  schedule:
    - cron: '14 14 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os:
          - 'ubuntu-24.04'
          # Keep the previous LTS runner in the matrix for compatibility coverage.
          - 'ubuntu-22.04'
          - 'macos-latest'
          - 'windows-latest'
        mdbook-version:
          - 'latest'
          - '0.4.0'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2.0.0
        with:
          mdbook-version: ${{ matrix.mdbook-version }}

      - name: Run mdbook --version
        shell: bash
        run: echo "mdbook_version=$(mdbook --version)" >> "$GITHUB_OUTPUT"
        id: mdbook_version

      - name: '${{ steps.mdbook_version.outputs.mdbook_version }}'
        run: echo '${{ steps.mdbook_version.outputs.mdbook_version }}'
